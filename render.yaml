services:
  - type: web
    name: rail-event-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt && apt-get install -y wkhtmltopdf
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
